- objective: 'oh, what about this, this might be potent framing that allows our research
    to garner more interest: as I''ve mentioned, my taste in research is that environmental
    interaction is necessary layer and it is being taken largely for granted. Imitation
    learning for robotics ultimately needs a huge model where memory is stored in
    the weights. But per Godel (is Godel the right argument to make? Why out why not?),
    it''s pretty much impossible to memorize enough of the world to create a reliable
    actor within that world. While some robotics add haptic feedback, it is measly,
