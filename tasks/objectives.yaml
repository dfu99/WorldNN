      with shaped reward. 180-config sweep + SLURM script. 8 new tests (29 total).
    metrics:
      state_dim: 4
      emission_channels: 2
      new_tests: 8
      total_tests: 29
      configs_planned: 180
      pace_job: 4952915
    figures:
      - results/rockpush_architecture.png
    conclusions: >
      Framework supports multi-object 2D tasks. 4D state + multi-channel
