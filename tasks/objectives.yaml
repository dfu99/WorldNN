      control. The standard pipeline needs to be fixed to use mu, or the
      architecture needs rethinking.
    connects_to: obj-013
    completed_date: "2026-03-16"

  - id: obj-013
    status: completed
    statement: "C_i coordination quality predicts learning success with r=-0.867"
    methodology: >
      Fixed VAE pipeline to use deterministic mu. Implemented C_i metric:
      cosine similarity between organism's action and analytically computed
      optimal action. Ran 50 configs on PACE RTX 6000: oracle × 5 embed_dims
      × 5 seeds + VAE(mu) lat=16 × 5 embed_dims × 5 seeds. 500 episodes
      each, 20 steps/episode.
    metrics:
      total_configs: 50
      correlation_r: -0.867
      oracle_Ci_emb2: 0.435
      oracle_Ci_emb32: 0.739
      vae_mu_Ci_emb2: 0.378
      vae_mu_Ci_emb32: 0.461
      threshold_Ci_06: "100% learn (7/7)"
      threshold_Ci_05: "3% learn (1/37)"
      vae_mu_still_broken: true
      runtime_minutes: 162
    figures:
      - results/obj013_coordination_quality.png
    conclusions: >
      C_i (coordination quality) strongly predicts task performance across
      perception and capacity conditions (r=-0.867). Sharp threshold: C_i≥0.6
      guarantees success, C_i<0.5 guarantees failure. Oracle capacity drives
      C_i from 0.435→0.739. VAE mu lat=16 caps at ~0.46 regardless of
      capacity — below the learning threshold. Capacity and perception are
      multiplicative: you need BOTH adequate perception AND sufficient capacity
      to cross the C_i threshold. The mu fix alone was insufficient; VAE lat=16
      still doesn't preserve enough directional information for spatial tasks.
    connects_to: obj-014
    completed_date: "2026-03-18"

