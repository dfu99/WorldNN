# Objectives Log — Structured scientific progress tracking

objectives:
  - id: obj-001
    status: completed
    statement: "Scaffold WorldNN framework and demonstrate 1-bit state flip via paramecium chemotaxis"
    methodology: >
      Built complete perception-action loop: Matter (binary Mealy machine) →
      Channel (noisy linear) → Environment (VAE) → Organism (sensory filter +
      embedding bottleneck + policy MLP). Two-phase training: VAE pre-training
      (500 steps), then REINFORCE with Gaussian policy (500 episodes, batch 512).
      Paramecium chemotaxis scenario with chemical diffusion noise σ=0.3.
    metrics:
      vae_final_loss: 0.17
      final_success_rate: 0.856
      random_baseline: 0.50
      training_episodes: 500
      unit_tests: 14
      test_status: all_passing
    figures:
      - results/demo_training.png
      - results/demo_episode.png
      - results/architecture.png
    conclusions: >
      The organism learns to perceive matter state through the lossy chain and
      reliably flip it to the target state (85.6% vs 50% baseline). The framework
      is operational and ready for systematic perturbation analysis.
    connects_to: obj-002
    completed_date: "2026-03-10"

  - id: obj-002
    status: completed
    statement: "Perturbation study: min organism capacity vs information loss across 75 configurations"
    methodology: >
      Swept channel_noise=[0.01,0.1,0.5,1.0,2.0] × env_latent_dim=[1,2,4] ×
      embedding_dim=[1,2,4,8,16] = 75 configs. Each: 500 VAE pre-train steps +
      400 REINFORCE episodes (batch 512). Measured success rate, MI at each chain
      stage (KSG estimator), training convergence.
    metrics:
      total_configs: 75
      env_lat1_max_success: 0.052
      env_lat2_low_noise_best: 0.883
      env_lat4_low_noise_best: 0.882
      noise_2_env_lat2_best: 0.630
      noise_2_env_lat4_best: 0.658
      min_embed_for_60pct_at_noise2_lat2: 4
      min_embed_for_60pct_at_noise2_lat4: 2
    figures:
      - results/success_heatmap.png
      - results/mi_chain.png
      - results/min_capacity_vs_noise.png
      - results/training_curves.png
    conclusions: >
      Three key findings: (1) Environment compression is the dominant bottleneck —
      env_latent_dim=1 kills all learning (~5% success) regardless of organism
      capacity. (2) Channel noise degrades gracefully: success drops from ~88% at
      σ=0.01 to ~63% at σ=2.0 for env_lat≥2. (3) Organism embedding dim has a
      nonlinear threshold: at high noise (σ=2), env_lat=2 requires embed≥4 for
      >60% success, while env_lat=4 only needs embed≥2 — more environmental
      bandwidth compensates for less brain capacity.
    connects_to: obj-003
    completed_date: "2026-03-10"

  - id: obj-003
    status: completed
    statement: "Diagnose env_latent_dim=1 failure: information vs RL bottleneck"
    methodology: >
      Re-trained 5 key configs (env_lat=1,2,4 × noise=0.01,0.1) with embedding=4.
      Collected VAE latent distributions conditioned on state. Computed threshold
      accuracy, Cohen's d, distribution overlap, and KDE-based overlap coefficient.
      Compared separability metrics against task success to distinguish H1 (MI
      overestimated), H2 (info present but inseparable), H3 (info present, RL fails).
    metrics:
      env_lat1_threshold_accuracy: 0.973
      env_lat2_threshold_accuracy: 0.989
      env_lat1_cohens_d: 3.825
      env_lat2_cohens_d: 4.026
      env_lat1_overlap: 0.058
      env_lat2_overlap: 0.026
      env_lat1_success: 0.048
      env_lat2_success: 0.861
      hypothesis_supported: "H3 — RL training bottleneck"
    figures:
      - results/latent_failure_analysis.png
      - results/latent_scatter_2d.png
      - results/mi_chain_annotated.png
    conclusions: >
      H3 confirmed: env_lat=1 preserves state information (97.3% separable, d=3.83)
      but REINFORCE cannot learn from 1D latent input. The failure is in RL
      optimization, not information compression. This reframes the central finding:
      organism capacity requirements depend on both information availability AND
      the learnability of the representation, not just its information content.
    connects_to: obj-004
    completed_date: "2026-03-10"

  - id: obj-004
    status: completed
    statement: "Fix env_lat=1 RL failure by replacing REINFORCE with PPO"
    methodology: >
      Tested 6 fixes for the 1D latent RL failure: (A) supervised sensory
      pre-training, (B) PPO, (C) remove sensory gate, (D) combined pretrain+
      PPO+no-gate, (E) pretrain+PPO, vs baseline REINFORCE. All with env_lat=1,
      noise=0.1, embed=4, 500 episodes, batch 512 on CPU.
    metrics:
      baseline_reinforce: 0.046
      fix_a_pretrain: 0.044
      fix_b_ppo: 0.873
      fix_c_no_gate: 0.043
      fix_d_combined: 0.719
      fix_e_pretrain_ppo: 0.866
      improvement_factor: 19x
    figures:
      - results/fix_1d_rl.png
    conclusions: >
      PPO alone fully solves the 1D latent learning problem (4.6% → 87.3%),
      matching env_lat=2 REINFORCE performance. The root cause was REINFORCE's
      high gradient variance with 1D input, not information loss. Sensory
      pre-training and gate removal have no effect — the bottleneck was purely
      the RL optimizer. This means the original "min capacity" findings from
      obj-002 partially reflect optimizer limitations, not fundamental
      information-theoretic bounds.
    connects_to: obj-005
    completed_date: "2026-03-10"

  - id: obj-005
    status: completed
    statement: "PPO perturbation sweep: confirm PPO fixes env_lat=1 across all noise/embedding configs"
    methodology: >
      Ran 70/75 PPO sweep configs on PACE RTX 6000 (5 configs at noise=2.0,
      env_lat=4 timed out). Same grid as obj-002: channel_noise=[0.01,0.1,0.5,1.0,2.0]
      × env_latent_dim=[1,2,4] × embedding_dim=[1,2,4,8,16]. Each config: 500 VAE
      pre-train steps + 400 PPO episodes (batch 512). Compared against REINFORCE
      baseline from obj-002.
    metrics:
      configs_completed: 70
      configs_total: 75
      env_lat1_noise001_mean_success: 0.72
      env_lat1_noise05_mean_success: 0.86
      env_lat1_noise2_mean_success: 0.58
      env_lat2_noise001_mean_success: 0.88
      env_lat2_noise2_mean_success: 0.63
      max_ppo_improvement_over_reinforce: 0.81
      ppo_improvement_env_lat1_range: "0.46 to 0.81"
      ppo_improvement_env_lat2_range: "0.00 to 0.16"
      embedding_dim_effect_with_ppo: "minimal"
    figures:
      - results/success_heatmap_ppo.png
      - results/ppo_vs_reinforce.png
      - results/noise_vs_success_ppo.png
      - results/nonmonotonic_noise_ppo.png
    conclusions: >
      PPO fully resolves the env_lat=1 failure across all noise levels (5% → 58-86%).
      Three key findings: (1) PPO's biggest impact is at env_lat=1 (+46-81pp), with
      diminishing returns at higher latent dims. (2) Surprising stochastic resonance:
      at env_lat=1, noise=0.5 outperforms noise=0.01 (86% vs 72%) — moderate channel
      noise appears to regularize PPO learning in low-dimensional spaces. (3) With PPO,
      organism embedding dim has almost no effect — the optimizer, not brain capacity,
      was the limiting factor in the original REINFORCE results.
    connects_to: obj-006
    completed_date: "2026-03-13"

  - id: obj-007-theory
    status: completed
    statement: "Derive information-theoretic bounds on minimum embedding dim for binary state flipping"
    methodology: >
      Computed AWGN channel capacity, VAE rate bounds, and Fano's inequality
      for the perception-action chain. Built 6-panel visualization comparing
      theoretical MI limits against empirical PPO results from obj-005.
    metrics:
      channel_capacity_at_noise2: 0.644 bits
      min_mi_for_90pct_success: 0.531 bits
      min_mi_for_99pct_success: 0.919 bits
      theoretical_min_embed_dim: 1
      theory_vs_empirical_gap: "lat=1 stochastic resonance not predicted by theory"
    figures:
      - results/theoretical_bounds.png
    conclusions: >
      Information-theoretic bounds predict dim_min=1 for all tested conditions
      because H(S)=1 bit is inherently low — even noisy channels preserve
      enough MI. The empirical success variations (72-88%) and stochastic
      resonance at lat=1 are NOT information-theoretic phenomena but optimizer
      effects (PPO vs REINFORCE). The real bottleneck in this system is
      learnability, not information availability. This reframes the central
      question from "how much capacity?" to "how learnable is the
      representation?"
    connects_to: obj-006
    completed_date: "2026-03-14"

  - id: obj-008-impl
    status: completed
    statement: "Implement continuous state spaces: ContinuousMatter, ContinuousWorld, PPO trainer"
    methodology: >
      Built ContinuousMatter (1D position in [0,1], force-based actions, smooth
      emissions) and ContinuousWorld (full perception-action loop with distance
      reward). Added train_organism_ppo_continuous with shaped reward. 180-config
      sweep script and SLURM submission ready. 7 new tests (21 total passing).
    metrics:
      new_tests: 7
      total_tests: 21
      configs_planned: 180
      smoke_test_10ep_distance: 0.586
    figures:
      - results/continuous_architecture.png
    conclusions: >
      Framework now supports both binary and continuous state tasks. The
      continuous task requires proportional control (vs binary switching),
      which should reveal whether embedding dimension matters more when
      finer-grained internal models are needed. Awaiting PACE submission.
    connects_to: obj-008
    completed_date: "2026-03-14"

  - id: obj-007-learn
    status: completed
    statement: "Develop learnability-aware bounds explaining stochastic resonance and REINFORCE failure"
    methodology: >
      Built phenomenological model based on gradient signal-to-noise ratio (GSNR).
      REINFORCE GSNR scales as 1/d^1.5 (catastrophe at d=1). PPO GSNR scales as
      1/d^0.3 (much weaker dim dependence). Added noise exploration bonus to explain
      stochastic resonance: channel noise diversifies z samples, preventing premature
      convergence at low latent dims. Fit against empirical data from obj-002/005.
    metrics:
      ppo_rmse: 0.173
      reinforce_rmse: 0.254
      predicted_resonance_peak: 0.438
      empirical_resonance_peak: 0.5
    figures:
      - results/learnability_bounds.png
    conclusions: >
      The GSNR model explains three empirical phenomena: (1) REINFORCE catastrophe
      at lat=1 is a phase transition in gradient quality (dim_penalty=0.02 vs 0.5
      at lat=2). (2) Stochastic resonance at lat=1 arises from noise acting as
      implicit exploration (predicted peak σ=0.44, empirical σ≈0.5). (3) Embedding
      dim irrelevance with PPO follows from GSNR depending on input dim, not internal
      capacity. Model overshoots PPO success at low noise (predicts 0.98 vs empirical
      0.72), suggesting additional unexplained variance at low noise.
    connects_to: obj-006
    completed_date: "2026-03-14"

  - id: obj-006
    status: completed
    statement: "Stochastic resonance investigation: fine-grained noise sweep with PPO vs REINFORCE"
    methodology: >
      Swept 13 noise levels [0.01-2.0] × env_lat=[1,2] × algo=[ppo,reinforce]
      × 5 seeds = 260 configs on PACE RTX 6000. Compared PPO and REINFORCE
      response to noise at the critical env_lat=1 bottleneck.
    metrics:
      total_configs: 260
      ppo_lat1_peak_noise: 0.5
      ppo_lat1_peak_success: 0.832
      ppo_lat1_low_noise_success: 0.831
      ppo_lat1_high_noise_success: 0.636
      reinforce_lat1_mean: 0.220
      reinforce_noise_effect: "none (flat ~0.22)"
    figures:
      - results/stochastic_resonance.png
      - results/resonance_algo_comparison.png
    conclusions: >
      The apparent stochastic resonance at noise=0.5 from obj-005 does not
      replicate as a strong peak. With 5 seeds and finer noise grid, PPO at
      lat=1 shows a nearly flat response from noise=0.01 to noise=0.5 (~0.82),
      then gradual degradation. The original "peak" was within seed variance.
      REINFORCE is completely flat (~0.22) regardless of noise — it cannot
      learn at lat=1 at any noise level.
    connects_to: obj-009
    completed_date: "2026-03-15"

  - id: obj-007
    status: completed
    statement: "Predictive processing: does next-state prediction improve organism learning?"
    methodology: >
      PredictiveOrganism with auxiliary prediction loss (predict next z from
      current z + action). 96 configs: noise=[0.1,0.5,1.0,2.0] ×
      env_lat=[1,2,4] × pred_coef=[0,0.01,0.1,0.5,1.0] × 3 seeds on PACE.
    metrics:
      total_configs: 96
      mean_with_prediction: 0.811
      mean_without_prediction: 0.811
      best_config: "pred_coef=0.1, noise=0.01, lat=2: 0.864"
      prediction_effect: "none"
    figures:
      - results/predictive_processing.png
      - results/predictive_improvement.png
    conclusions: >
      Predictive processing provides zero improvement over baseline PPO.
      Mean success is identical (0.811) with and without prediction auxiliary
      loss across all tested coefficients and noise levels. For the binary
      state-flip task, world-model learning via next-state prediction does
      not help — the task is too simple to benefit from predictive coding.
    connects_to: obj-009
    completed_date: "2026-03-15"

  - id: obj-008
    status: completed
    statement: "Continuous state spaces: does embedding dimension matter for proportional control?"
    methodology: >
      ContinuousMatter (1D position [0,1], force-based actions) with 180
      configs: noise=[0.01,0.1,0.5,1.0,2.0] × env_lat=[1,2,4] ×
      embed=[1,2,4,8] × 3 seeds on PACE RTX 6000. Distance-based reward.
    metrics:
      total_configs: 180
      best_config: "noise=0.1, lat=4, embed=8: dist=0.157"
      embed1_mean_dist: 0.236
      embed2_mean_dist: 0.236
      embed4_mean_dist: 0.236
      embed8_mean_dist: 0.232
      embedding_effect: "negligible"
    figures:
      - results/continuous_state.png
    conclusions: >
      Embedding dimension has negligible effect on continuous state tasks,
      matching the binary task finding from obj-005. Even the continuous
      proportional-control task does not require larger internal models.
      This strongly supports the obj-007-theory conclusion that the bottleneck
      is representation learnability, not organism capacity. The information
      content of the task (1D position) is inherently low.
    connects_to: obj-009
    completed_date: "2026-03-15"

