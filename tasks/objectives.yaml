    methodology: >
      Bypassed channel+VAE pipeline, fed raw 4D state [rock_xy, org_xy] directly
      to organism. Tested embed_dim=[2,4,8,16,32] with 500 episodes PPO, 20 steps,
      5 seeds each. embed=2,4 on CPU; embed=8,16,32 on PACE RTX 6000 (job 4959258).
    metrics:
